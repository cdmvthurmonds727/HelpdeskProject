apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: helpdesk-alert-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: helpdesk.rules
      rules:
        - alert: HelpdeskBackendDown
          expr: up{job="helpdesk-backend"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Helpdesk backend is down"
            description: "Prometheus cannot scrape the Helpdesk backend /metrics endpoint."

        - alert: HelpdeskHighApiLatency
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Helpdesk API latency is high"
            description: "95th percentile API latency is above 1 second for 5 minutes."

        - alert: HelpdeskHighErrorRate
          expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Helpdesk API 5xx errors detected"
            description: "The backend is returning server errors."

        - alert: HelpdeskPodRestarting
          expr: increase(kube_pod_container_status_restarts_total{pod=~".*helpdesk.*"}[10m]) > 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Helpdesk pod is restarting repeatedly"
            description: "A Helpdesk pod restarted more than twice in the last 10 minutes."
