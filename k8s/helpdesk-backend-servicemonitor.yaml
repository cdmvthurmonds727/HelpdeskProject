apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: helpdesk-backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - helpdesk
      - default
  selector:
    matchLabels:
      app: helpdesk-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
