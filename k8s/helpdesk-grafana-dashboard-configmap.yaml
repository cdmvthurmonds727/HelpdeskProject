apiVersion: v1
kind: ConfigMap
metadata:
  name: helpdesk-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  helpdesk-overview.json: |
    {
      "id": null,
      "uid": "helpdesk-overview",
      "title": "Helpdesk Ticketing System Overview",
      "tags": [
        "helpdesk",
        "kubernetes",
        "prometheus"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "API Request Rate",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m]))",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "95th Percentile API Latency",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "5xx Error Rate",
          "gridPos": {
            "x": 16,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m]))",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Tickets Created Total",
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 6,
            "h": 5
          },
          "targets": [
            {
              "expr": "sum(tickets_created_total)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Tickets Updated Total",
          "gridPos": {
            "x": 6,
            "y": 6,
            "w": 6,
            "h": 5
          },
          "targets": [
            {
              "expr": "sum(tickets_updated_total)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Tickets Deleted Total",
          "gridPos": {
            "x": 12,
            "y": 6,
            "w": 6,
            "h": 5
          },
          "targets": [
            {
              "expr": "sum(tickets_deleted_total)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "bargauge",
          "title": "Tickets By Status",
          "gridPos": {
            "x": 18,
            "y": 6,
            "w": 6,
            "h": 5
          },
          "targets": [
            {
              "expr": "sum(tickets_by_status) by (status)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Backend Pod CPU",
          "gridPos": {
            "x": 0,
            "y": 11,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\".*backend.*\"}[5m])) by (pod)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Backend Pod Memory",
          "gridPos": {
            "x": 8,
            "y": 11,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{pod=~\".*backend.*\"}) by (pod)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Helpdesk Pod Restarts",
          "gridPos": {
            "x": 16,
            "y": 11,
            "w": 8,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{pod=~\".*helpdesk.*\"}) by (pod)",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Database Query Duration p95",
          "gridPos": {
            "x": 0,
            "y": 17,
            "w": 12,
            "h": 6
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(database_query_duration_seconds_bucket[5m])) by (le, operation))",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Backend Scrape Status",
          "gridPos": {
            "x": 12,
            "y": 17,
            "w": 12,
            "h": 6
          },
          "targets": [
            {
              "expr": "up{job=~\".*helpdesk.*|helpdesk-backend\"}",
              "legendFormat": "{{status}}{{pod}}{{route}}{{method}}{{operation}}",
              "refId": "A"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      }
    }
