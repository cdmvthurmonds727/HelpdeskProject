apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: helpdesk
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS tickets (
      id SERIAL PRIMARY KEY,
      title VARCHAR(255) NOT NULL,
      description TEXT NOT NULL,
      priority VARCHAR(50) NOT NULL DEFAULT 'Medium',
      status VARCHAR(50) NOT NULL DEFAULT 'Open',
      requester VARCHAR(255) NOT NULL,
      assigned_to VARCHAR(255),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO tickets (title, description, priority, status, requester, assigned_to)
    VALUES
    ('Printer not working', 'Office printer on floor 2 is jammed and offline.', 'Medium', 'Open', 'Alice Johnson', 'Tech Team'),
    ('Password reset needed', 'Unable to access company portal after password expiration.', 'High', 'In Progress', 'Bob Smith', 'Service Desk'),
    ('Laptop battery issue', 'Laptop battery drains within 20 minutes.', 'Low', 'Open', 'Carol Davis', 'Hardware Team');
